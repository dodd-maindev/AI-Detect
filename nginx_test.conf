# ============================================================
# NGINX CONFIG FOR DDoS TESTING LAB
# ============================================================
# 
# WARNING: This is a WEAK configuration for testing purposes.
# DO NOT use in production!
#
# To apply: Copy to your Ubuntu VM at /etc/nginx/nginx.conf
# Then: sudo systemctl restart nginx
#
# ============================================================

user www-data;
worker_processes 1;
worker_rlimit_nofile 1024;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 256;      # WEAK: Only 256 total connections
    use epoll;                    # Linux optimized
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # === WEAK SETTINGS FOR TESTING ===
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    keepalive_timeout 30;         # Long timeout = connection exhaustion
    keepalive_requests 100;
    
    # Short timeouts - easier to DoS
    client_header_timeout 15;
    client_body_timeout 15;
    send_timeout 15;

    # WEAK RATE LIMITING - easy to bypass
    limit_req_zone $binary_remote_addr zone=req_limit:1m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:1m;

    # Small buffers - easier to overflow
    client_body_buffer_size 8k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 4k;
    client_max_body_size 1m;

    # === SERVER BLOCK ===
    server {
        listen 80;
        server_name _;

        root /var/www/html;
        index index.html index.htm;

        # WEAK LIMITS - high burst, high connections
        limit_req zone=req_limit burst=200 nodelay;  # 200 burst = easy to exceed
        limit_conn conn_limit 50;                      # 50/IP = high
        
        # Proxy to backend (adjust port as needed)
        location / {
            proxy_pass http://127.0.0.1:3000;
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            proxy_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Stub status - useful for monitoring
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
    }
}

